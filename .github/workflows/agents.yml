name: Agents CI

on:
  pull_request:
    paths:
      - 'src/agents.ts'
  push:
    branches: [main]
    paths:
      - 'src/agents.ts'

concurrency:
  group: agents-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate agents
        run: bun run validate:agents

  sync-agents:
    needs: validate-agents
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync agents
        run: bun run sync:agents

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet README.md package.json || (git add README.md package.json && git commit -m "chore: update README and package.json with latest agents")

      - name: Push changes
        run: git push
