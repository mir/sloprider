name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sloprider-linux-x64
            target: bun-linux-x64
            outfile: sloprider-linux-x64
          - os: ubuntu-latest
            artifact: sloprider-linux-x64-musl
            target: bun-linux-x64-musl
            outfile: sloprider-linux-x64-musl
          - os: ubuntu-latest
            artifact: sloprider-linux-arm64
            target: bun-linux-arm64
            outfile: sloprider-linux-arm64
          - os: ubuntu-latest
            artifact: sloprider-linux-arm64-musl
            target: bun-linux-arm64-musl
            outfile: sloprider-linux-arm64-musl
          - os: macos-latest
            artifact: sloprider-darwin-arm64
            target: bun-darwin-arm64
            outfile: sloprider-darwin-arm64
          - os: macos-latest
            artifact: sloprider-darwin-x64
            target: bun-darwin-x64
            outfile: sloprider-darwin-x64
          - os: ubuntu-latest
            artifact: sloprider-windows-x64
            target: bun-windows-x64
            outfile: sloprider-windows-x64.exe
          - os: ubuntu-latest
            artifact: sloprider-windows-arm64
            target: bun-windows-arm64
            outfile: sloprider-windows-arm64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable
        shell: bash
        run: |
          mkdir -p dist/release
          bun build --compile --bytecode --sourcemap --target=${{ matrix.target }} ./src/cli.ts --outfile=dist/release/${{ matrix.outfile }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/release/${{ matrix.outfile }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Create GitHub Release
        run: gh release create "${GITHUB_REF_NAME}" dist/release/* --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
